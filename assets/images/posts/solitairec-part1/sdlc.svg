<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 554" role="img" aria-labelledby="sdlcTitle sdlcDesc">
<title id="sdlcTitle">Build pipeline for the SolitaireC headless replatform</title>
<desc id="sdlcDesc">Client feedback and the developer's own backlog both feed into Linear. Linear tickets spawn feature branches implemented in Claude Code, guided by Google Stitch design exports. Every pull request runs automated tests and generates a Vercel preview URL the client reviews. Merge to main auto-deploys to production.</desc>

<style>
  svg { color: #2C2C2A; font-family: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
  text { fill: currentColor; }
  .t-title { font-size: 14px; font-weight: 500; }
  .t-sub { font-size: 12px; font-weight: 400; opacity: 0.72; }
  .arrow { fill: none; stroke: currentColor; stroke-width: 1.2; opacity: 0.55; stroke-linecap: round; }
  .b-gray   { fill: #F1EFE8; stroke: #888780; stroke-width: 0.8; }
  .b-purple { fill: #EEEDFE; stroke: #7F77DD; stroke-width: 0.8; }
  .b-teal   { fill: #E1F5EE; stroke: #1D9E75; stroke-width: 0.8; }
  .tx-gray   { fill: #2C2C2A; }
  .tx-purple { fill: #26215C; }
  .tx-teal   { fill: #04342C; }

  @media (prefers-color-scheme: dark) {
    svg { color: #D3D1C7; }
    .b-gray   { fill: #2C2C2A; stroke: #888780; }
    .b-purple { fill: #26215C; stroke: #7F77DD; }
    .b-teal   { fill: #04342C; stroke: #1D9E75; }
    .tx-gray   { fill: #D3D1C7; }
    .tx-purple { fill: #CECBF6; }
    .tx-teal   { fill: #9FE1CB; }
  }
</style>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect class="b-gray" x="40" y="30" width="160" height="44" rx="8"/>
<text class="t-title tx-gray" x="120" y="52" text-anchor="middle" dominant-baseline="central">Client feedback</text>

<rect class="b-gray" x="40" y="90" width="160" height="44" rx="8"/>
<text class="t-title tx-gray" x="120" y="112" text-anchor="middle" dominant-baseline="central">My backlog</text>

<rect class="b-gray" x="480" y="150" width="160" height="64" rx="8"/>
<text class="t-title tx-gray" x="560" y="174" text-anchor="middle" dominant-baseline="central">Google Stitch</text>
<text class="t-sub tx-gray" x="560" y="194" text-anchor="middle" dominant-baseline="central">Mood board export</text>

<rect class="b-purple" x="240" y="50" width="200" height="64" rx="8"/>
<text class="t-title tx-purple" x="340" y="74" text-anchor="middle" dominant-baseline="central">Linear</text>
<text class="t-sub tx-purple" x="340" y="94" text-anchor="middle" dominant-baseline="central">Shared ticket board</text>

<rect class="b-purple" x="240" y="150" width="200" height="64" rx="8"/>
<text class="t-title tx-purple" x="340" y="174" text-anchor="middle" dominant-baseline="central">Claude Code</text>
<text class="t-sub tx-purple" x="340" y="194" text-anchor="middle" dominant-baseline="central">Feature branch</text>

<rect class="b-purple" x="240" y="250" width="200" height="64" rx="8"/>
<text class="t-title tx-purple" x="340" y="274" text-anchor="middle" dominant-baseline="central">Pull request</text>
<text class="t-sub tx-purple" x="340" y="294" text-anchor="middle" dominant-baseline="central">Required CI checks</text>

<rect class="b-teal" x="240" y="350" width="200" height="64" rx="8"/>
<text class="t-title tx-teal" x="340" y="374" text-anchor="middle" dominant-baseline="central">Vercel Preview</text>
<text class="t-sub tx-teal" x="340" y="394" text-anchor="middle" dominant-baseline="central">Client reviews URL</text>

<rect class="b-teal" x="240" y="450" width="200" height="64" rx="8"/>
<text class="t-title tx-teal" x="340" y="474" text-anchor="middle" dominant-baseline="central">Production</text>
<text class="t-sub tx-teal" x="340" y="494" text-anchor="middle" dominant-baseline="central">Merge to main, auto-deploy</text>

<path class="arrow" d="M 200 52  L 240 70"  marker-end="url(#arrow)"/>
<path class="arrow" d="M 200 112 L 240 94"  marker-end="url(#arrow)"/>
<path class="arrow" d="M 340 114 L 340 150" marker-end="url(#arrow)"/>
<path class="arrow" d="M 480 182 L 440 182" marker-end="url(#arrow)"/>
<path class="arrow" d="M 340 214 L 340 250" marker-end="url(#arrow)"/>
<path class="arrow" d="M 340 314 L 340 350" marker-end="url(#arrow)"/>
<path class="arrow" d="M 340 414 L 340 450" marker-end="url(#arrow)"/>
</svg>
