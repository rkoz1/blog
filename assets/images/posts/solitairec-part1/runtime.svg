<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 420" role="img" aria-labelledby="rtTitle rtDesc">
<title id="rtTitle">Runtime architecture — cross-domain checkout and attribution</title>
<desc id="rtDesc">Customer traffic lands on the apex domain running Next.js on Vercel. The apex reads and writes the Wix backend via SDK for products, inventory, carts, members, and CMS. Checkout and authentication redirect to a legacy Wix site on a subdomain, which hosts the engine-bound routes and drives Stripe for cards and wallets, with PayMe available via manual QR. On purchase creation, a Wix Automation fires a webhook back to the apex Next.js app to close the cross-domain attribution loop.</desc>

<style>
  svg { color: #2C2C2A; font-family: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
  text { fill: currentColor; }
  .t-title { font-size: 14px; font-weight: 500; }
  .t-sub   { font-size: 12px; font-weight: 400; opacity: 0.72; }
  .t-lbl   { font-size: 11px; font-weight: 400; opacity: 0.7; }
  .arrow   { fill: none; stroke: currentColor; stroke-width: 1.2; opacity: 0.55; stroke-linecap: round; }
  .arrow-dashed { fill: none; stroke: currentColor; stroke-width: 1.2; opacity: 0.55; stroke-linecap: round; stroke-dasharray: 5 4; }
  .b-gray   { fill: #F1EFE8; stroke: #888780; stroke-width: 0.8; }
  .b-purple { fill: #EEEDFE; stroke: #7F77DD; stroke-width: 0.8; }
  .b-teal   { fill: #E1F5EE; stroke: #1D9E75; stroke-width: 0.8; }
  .b-amber  { fill: #FAEEDA; stroke: #BA7517; stroke-width: 0.8; }
  .tx-gray   { fill: #2C2C2A; }
  .tx-purple { fill: #26215C; }
  .tx-teal   { fill: #04342C; }
  .tx-amber  { fill: #633806; }

  @media (prefers-color-scheme: dark) {
    svg { color: #D3D1C7; }
    .b-gray   { fill: #2C2C2A; stroke: #888780; }
    .b-purple { fill: #26215C; stroke: #7F77DD; }
    .b-teal   { fill: #04342C; stroke: #1D9E75; }
    .b-amber  { fill: #412402; stroke: #EF9F27; }
    .tx-gray   { fill: #D3D1C7; }
    .tx-purple { fill: #CECBF6; }
    .tx-teal   { fill: #9FE1CB; }
    .tx-amber  { fill: #FAC775; }
  }
</style>

